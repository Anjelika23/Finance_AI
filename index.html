<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanceAI — Portfolio & Loan Intelligence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* CSS variables and Reset */
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{
            --white:#ffffff;--ink:#0f1117;--ink2:#4a5260;--ink3:#9aa0ad;
            --line:#e8eaed;--surface:#f7f8fa;--surface2:#f2f3f5;
            --accent:#0052cc;--accent-soft:#e8f0fc;
            --green:#0a7c4e;--green-soft:#e6f7f1;
            --red:#c0392b;--red-soft:#fdf0ee;
            --amber:#92600a;--amber-soft:#fdf6e3;
            --sans:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
            --r:6px;--r-sm:4px;
        }
        body{background:var(--surface);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.6}

        /* Layout & Header */
        header{background:var(--white);border-bottom:1px solid var(--line);padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:100}
        .wordmark{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--ink)}
        .wordmark em{color:var(--accent);font-style:normal}
        .hdr-right{display:flex;align-items:center;gap:20px}
        .live-pill{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--ink3);font-family:var(--mono)}
        .live-dot{width:5px;height:5px;border-radius:50%;background:#22c55e;animation:breathe 2s ease-in-out infinite}
        @keyframes breathe{0%,100%{opacity:1}50%{opacity:.35}}
        #clock{font-family:var(--mono);font-size:12px;color:var(--ink3)}

        nav{background:var(--white);border-bottom:1px solid var(--line);padding:0 32px;display:flex}
        .nav-item{padding:12px 18px;font-size:13px;color:var(--ink3);cursor:pointer;border-bottom:2px solid transparent;transition:color .15s,border-color .15s}
        .nav-item.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:500}

        .page{display:none}.page.active{display:block}

        /* Portfolio Sidebar & Main */
        .p-layout{display:grid;grid-template-columns:224px 1fr;min-height:calc(100vh - 97px)}
        .p-sidebar{background:var(--white);border-right:1px solid var(--line);padding:20px;display:flex;flex-direction:column;gap:20px}
        .sec-label{font-size:10px;font-weight:500;letter-spacing:.8px;text-transform:uppercase;color:var(--ink3);margin-bottom:10px}
        .f-group{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
        .f-label{font-size:11px;color:var(--ink3)}
        
        select,input[type=range],.amt-input{width:100%;background:var(--surface2);border:1px solid var(--line);color:var(--ink);padding:7px 9px;font-family:var(--sans);font-size:13px;border-radius:var(--r-sm);outline:none}
        .amt-input{font-family:var(--mono);background:var(--white)}

        .p-main{padding:24px 28px}
        .kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px}
        .kpi{background:var(--white);border:1px solid var(--line);border-radius:var(--r);padding:14px 16px}
        .kpi-label{font-size:11px;color:var(--ink3);margin-bottom:5px}
        .kpi-val{font-family:var(--mono);font-size:19px;font-weight:500;line-height:1}
        .pos{color:var(--green)}.neg{color:var(--red)}.blue{color:var(--accent)}

        .tab-panel{background:var(--white);border:1px solid var(--line);border-radius:0 0 var(--r) var(--r); min-height: 400px}
        .dtable{width:100%;border-collapse:collapse}
        .dtable th{font-size:11px;color:var(--ink3);text-align:left;padding:12px 18px;border-bottom:1px solid var(--line)}
        .dtable td{padding:12px 18px;border-bottom:1px solid var(--surface2);font-size:13px}
        
        .sym-cell{display:flex;align-items:center;gap:9px}
        .swatch{width:8px;height:8px;border-radius:2px}
        .sig{padding:2px 6px;border-radius:3px;font-size:10px;font-weight:bold}
        .sig-buy{background:var(--green-soft);color:var(--green)}
        .sig-hold{background:var(--amber-soft);color:var(--amber)}
        .sig-sell{background:var(--red-soft);color:var(--red)}

        @media(max-width:768px){ .p-layout{grid-template-columns:1fr} }
    </style>
</head>
<body>

<header>
    <div class="wordmark">finance<em>ai</em></div>
    <div class="hdr-right">
        <div class="live-pill"><div class="live-dot"></div>Markets open</div>
        <div id="clock">00:00:00</div>
    </div>
</header>

<nav>
    <div class="nav-item active">Portfolio</div>
    <div class="nav-item">Loan eligibility</div>
</nav>

<div id="page-portfolio" class="page active">
    <div class="p-layout">
        <aside class="p-sidebar">
            <div>
                <div class="sec-label">Settings</div>
                <div class="f-group">
                    <span class="f-label">Risk profile</span>
                    <select id="risk-profile" onchange="rebuild()">
                        <option value="conservative">Conservative</option>
                        <option value="moderate" selected>Moderate</option>
                        <option value="aggressive">Aggressive</option>
                        <option value="ultra">Ultra aggressive</option>
                    </select>
                </div>
                <div class="f-group">
                    <span class="f-label">Investment Amount ($)</span>
                    <input type="number" id="amt-direct" class="amt-input" value="100000" oninput="syncAmount('input')">
                    <input type="range" id="inv-amount" min="10000" max="1000000" step="10000" value="100000" oninput="syncAmount('slider')">
                </div>
                <div class="f-group">
                    <span class="f-label">Sector Focus</span>
                    <select id="sector" onchange="rebuild()">
                        <option value="balanced">Balanced</option>
                        <option value="tech">Technology</option>
                        <option value="dividend">Dividend / Income</option>
                        <option value="growth">Growth</option>
                    </select>
                </div>
            </div>
        </aside>

        <main class="p-main">
            <div class="kpi-row" id="kpi-row"></div>
            <div class="tab-panel">
                <table class="dtable">
                    <thead>
                        <tr>
                            <th>Asset</th>
                            <th>Weight</th>
                            <th>Price</th>
                            <th>Change</th>
                            <th>P/E</th>
                            <th>Signal</th>
                        </tr>
                    </thead>
                    <tbody id="holdings-body"></tbody>
                </table>
            </div>
        </main>
    </div>
</div>

<script>
    // Config & Fallback Data
    window.BACKEND_URL = "https://finance-ai-gvkw.vercel.app"; 

    const PR = {
        conservative: {lbl:'Conservative', dd:-12, sh:0.82, be:0.55, v:7.4, r:6.2},
        moderate: {lbl:'Moderate', dd:-22, sh:1.04, be:0.78, v:11.2, r:8.6},
        aggressive: {lbl:'Aggressive', dd:-35, sh:1.21, be:1.05, v:16.8, r:11.4},
        ultra: {lbl:'Ultra', dd:-48, sh:1.38, be:1.32, v:22.1, r:14.2}
    };

    const HD = {
        balanced: [
            {t:'SPY', n:'S&P 500 ETF', p:562.84, ch:0.42, pe:22.4, sg:'BUY', c:'#2563eb', w:40},
            {t:'BND', n:'Total Bond ETF', p:73.42, ch:-0.05, pe:null, sg:'HOLD', c:'#94a3b8', w:60}
        ],
        tech: [
            {t:'QQQ', n:'Nasdaq 100', p:481.20, ch:0.68, pe:28.1, sg:'BUY', c:'#7c3aed', w:50},
            {t:'NVDA', n:'NVIDIA Corp', p:886.20, ch:1.82, pe:62.4, sg:'BUY', c:'#16a34a', w:50}
        ],
        growth: [
            {t:'VUG', n:'Vanguard Growth', p:348.12, ch:1.15, pe:34.2, sg:'BUY', c:'#7c3aed', w:40},
            {t:'TSLA', n:'Tesla Inc', p:248.42, ch:2.45, pe:68.4, sg:'HOLD', c:'#e11d48', w:30},
            {t:'AMZN', n:'Amazon.com', p:189.20, ch:0.55, pe:52.1, sg:'BUY', c:'#ff9900', w:30}
        ]
    };

    // --- Core Functions ---

    function syncAmount(source) {
        const slider = document.getElementById('inv-amount');
        const input = document.getElementById('amt-direct');
        if(source === 'slider') input.value = slider.value;
        else slider.value = input.value;
        rebuild();
    }

    async function fetchLiveStocks(sector) {
        try {
            const res = await fetch(`${window.BACKEND_URL}/api/stocks?sector=${sector}`);
            const data = await res.json();
            if (data.stocks && data.stocks.length > 0) {
                return data.stocks.map((s, i) => ({
                    t: s.t, n: s.n, p: s.p, ch: s.ch, pe: s.pe,
                    sg: s.ch > 1 ? 'BUY' : s.ch < -1 ? 'SELL' : 'HOLD',
                    c: ['#2563eb','#7c3aed','#0891b2','#16a34a','#b45309'][i % 5],
                    w: Math.round(100 / data.stocks.length),
                }));
            }
        } catch (e) { console.warn('Live fetch failed, using fallback.'); }
        return null;
    }

    async function rebuild() {
        const risk = document.getElementById('risk-profile').value;
        const sector = document.getElementById('sector').value;
        const p = PR[risk];

        // UI Loading State
        document.getElementById('holdings-body').innerHTML = `<tr><td colspan="6" style="text-align:center;padding:40px">Updating market data...</td></tr>`;

        const liveStocks = await fetchLiveStocks(sector);
        const h = liveStocks || HD[sector] || HD.balanced;

        // Render KPIs
        document.getElementById('kpi-row').innerHTML = `
            <div class="kpi"><div class="kpi-label">Return Est.</div><div class="kpi-val blue">${p.r}%</div></div>
            <div class="kpi"><div class="kpi-label">Sharpe</div><div class="kpi-val">${p.sh}</div></div>
            <div class="kpi"><div class="kpi-label">Drawdown</div><div class="kpi-val neg">${p.dd}%</div></div>
            <div class="kpi"><div class="kpi-label">Volatility</div><div class="kpi-val">${p.v}%</div></div>
        `;

        // Render Table
        document.getElementById('holdings-body').innerHTML = h.map(item => `
            <tr>
                <td><div class="sym-cell"><div class="swatch" style="background:${item.c}"></div><b>${item.t}</b></div></td>
                <td>${item.w}%</td>
                <td>$${item.p.toLocaleString()}</td>
                <td class="${item.ch >= 0 ? 'pos' : 'neg'}">${item.ch}%</td>
                <td>${item.pe || '—'}</td>
                <td><span class="sig sig-${item.sg.toLowerCase()}">${item.sg}</span></td>
            </tr>
        `).join('');
    }

    // Clock & Initial Load
    setInterval(() => {
        document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-US', { hour12: false });
    }, 1000);

    window.onload = rebuild;
</script>
</body>
</html>
